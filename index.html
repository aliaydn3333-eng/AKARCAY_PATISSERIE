<style>
  :root {
    --color-bg: #F7EFE3;
    --color-surface: #FFFCF6;
    --color-surface-alt: #FBF3E6;
    --color-primary: #963A26;
    --color-primary-dark: #722A1B;
    --color-text: #2A2018;
    --color-text-muted: #6B5B4C;
    --color-border: #E9DEC9;
    --color-focus: #963A26;
    --font-serif: Georgia, 'Times New Roman', ui-serif, serif;
    --font-sans: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    --space-1: 4px; --space-2: 8px; --space-3: 12px; --space-4: 16px;
    --space-5: 20px; --space-6: 24px; --space-7: 32px; --space-8: 40px;
    --radius: 14px;
    --nav-height: 56px;
  }

  * { box-sizing: border-box; }
  html { scroll-behavior: smooth; -webkit-text-size-adjust: 100%; }
  body {
    margin: 0;
    background: var(--color-bg);
    color: var(--color-text);
    font-family: var(--font-sans);
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }
  img { max-width: 100%; display: block; }
  ul { list-style: none; margin: 0; padding: 0; }

  /* ---------- Header / Hero ---------- */
  .site-header {
    background: var(--color-surface-alt);
    padding: var(--space-7) var(--space-4) var(--space-6);
    text-align: center;
    border-bottom: 1px solid var(--color-border);
  }
  .site-header__eyebrow {
    margin: 0 0 var(--space-2);
    font-size: 0.8rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--color-primary);
    font-weight: 600;
  }
  .site-header__brand {
    margin: 0 0 var(--space-2);
    font-family: var(--font-serif);
    font-size: 1.9rem;
    color: var(--color-primary-dark);
  }
  .site-header__tagline {
    margin: 0 auto;
    font-size: 0.95rem;
    color: var(--color-text-muted);
    max-width: 32ch;
  }

  /* ---------- Arama ---------- */
  .search-bar {
    display: flex;
    align-items: center;
    gap: var(--space-2);
    background: var(--color-surface);
    border: 1px solid var(--color-border);
    border-radius: 999px;
    margin: var(--space-4);
    padding: var(--space-2) var(--space-4);
  }
  .search-bar__input {
    flex: 1;
    min-width: 0;
    border: 0;
    background: transparent;
    font-size: 1rem;
    font-family: var(--font-sans);
    color: var(--color-text);
    outline: none;
  }
  .search-bar__input::placeholder { color: var(--color-text-muted); }
  .search-bar__clear {
    border: 0;
    background: var(--color-border);
    color: var(--color-text);
    width: 28px;
    height: 28px;
    border-radius: 50%;
    font-size: 1rem;
    line-height: 1;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .search-bar__clear:hover { background: var(--color-primary); color: #fff; }

  /* ---------- Sticky kategori menüsü ---------- */
  .category-nav {
    position: sticky;
    top: 0;
    z-index: 20;
    background: var(--color-surface-alt);
    border-bottom: 1px solid var(--color-border);
  }
  .category-nav__list {
    display: flex;
    gap: var(--space-2);
    padding: var(--space-3) var(--space-4);
    overflow-x: auto;
    scrollbar-width: thin;
    -webkit-overflow-scrolling: touch;
  }
  .category-nav__list::-webkit-scrollbar { height: 4px; }
  .category-nav__button {
    flex-shrink: 0;
    border: 1px solid var(--color-border);
    background: var(--color-surface);
    color: var(--color-text);
    font-family: var(--font-sans);
    font-weight: 600;
    font-size: 0.88rem;
    padding: 10px 16px;
    border-radius: 999px;
    cursor: pointer;
    white-space: nowrap;
    min-height: 44px;
    transition: background-color .15s ease, color .15s ease, border-color .15s ease;
  }
  .category-nav__button:hover { border-color: var(--color-primary); }
  .category-nav__button[aria-current="true"] {
    background: var(--color-primary);
    border-color: var(--color-primary);
    color: #fff;
  }

  /* ---------- Menü içeriği ---------- */
  main {
    max-width: 720px;
    margin-inline: auto;
    padding: var(--space-6) var(--space-4) var(--space-8);
  }
  .menu-category {
    margin-bottom: var(--space-8);
    scroll-margin-top: calc(var(--nav-height) + var(--space-4));
  }
  .menu-category__title {
    font-family: var(--font-serif);
    font-size: 1.3rem;
    color: var(--color-primary-dark);
    margin: 0 0 var(--space-4);
    padding-bottom: var(--space-2);
    border-bottom: 2px solid var(--color-border);
  }
  .menu-category__grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: var(--space-4);
  }
  @media (min-width: 768px) {
    .menu-category__grid { grid-template-columns: 1fr 1fr; }
  }

  /* ---------- Ürün kartı ---------- */
  .product-card {
    background: var(--color-surface);
    border: 1px solid var(--color-border);
    border-radius: var(--radius);
    overflow: hidden;
    box-shadow: 0 1px 2px rgba(42, 32, 24, 0.06);
    transition: transform .15s ease, box-shadow .15s ease;
    display: flex;
    flex-direction: column;
  }
  .product-card:hover, .product-card:active {
    transform: translateY(-2px);
    box-shadow: 0 6px 16px rgba(42, 32, 24, 0.12);
  }
  .product-card__media {
    aspect-ratio: 4 / 3;
    background: var(--color-border);
    overflow: hidden;
  }
  .product-card__image { width: 100%; height: 100%; object-fit: cover; }
  .product-card__body {
    padding: var(--space-4);
    display: flex;
    flex-direction: column;
    gap: var(--space-2);
    flex: 1;
  }
  .product-card__head {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: var(--space-2);
  }
  .product-card__name { margin: 0; font-size: 1.02rem; font-weight: 700; color: var(--color-text); }
  .product-card__price { font-weight: 700; font-size: 1.02rem; color: var(--color-primary-dark); white-space: nowrap; }
  .product-card__desc { margin: 0; font-size: 0.85rem; color: var(--color-text-muted); line-height: 1.5; }
  .product-card__tag {
    align-self: flex-start;
    font-size: 0.72rem;
    font-weight: 600;
    color: var(--color-primary-dark);
    background: var(--color-surface-alt);
    border: 1px solid var(--color-border);
    padding: 3px 10px;
    border-radius: 999px;
    text-transform: uppercase;
    letter-spacing: .04em;
  }

  /* ---------- Boş durum ---------- */
  .empty-state { text-align: center; padding: var(--space-8) var(--space-4); color: var(--color-text-muted); }
  .empty-state__reset {
    margin-top: var(--space-3);
    border: 1px solid var(--color-primary);
    background: var(--color-surface);
    color: var(--color-primary-dark);
    font-weight: 600;
    padding: 10px 20px;
    border-radius: 999px;
    cursor: pointer;
  }
  .empty-state__reset:hover { background: var(--color-primary); color: #fff; }

  /* ---------- Footer ---------- */
  .site-footer {
    text-align: center;
    padding: var(--space-6) var(--space-4);
    color: var(--color-text-muted);
    font-size: 0.8rem;
    border-top: 1px solid var(--color-border);
  }

  :focus-visible { outline: 2px solid var(--color-focus); outline-offset: 2px; }

  /* ---------- Alt kategori filtreleri (İçecekler / Tatlılar) ---------- */
  .category-filters { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
  .category-filters__row {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    scrollbar-width: thin;
    -webkit-overflow-scrolling: touch;
    padding-bottom: 2px;
  }
  .category-filters__row::-webkit-scrollbar { height: 4px; }
  .filter-chip {
    flex-shrink: 0;
    border: 1px solid var(--color-border);
    background: var(--color-surface);
    color: var(--color-text-muted);
    font-family: var(--font-sans);
    font-weight: 600;
    font-size: 0.8rem;
    padding: 8px 14px;
    border-radius: 999px;
    cursor: pointer;
    white-space: nowrap;
    min-height: 36px;
    transition: background-color .15s ease, color .15s ease, border-color .15s ease;
  }
  .filter-chip:hover { border-color: var(--color-primary); }
  .filter-chip[aria-pressed="true"] {
    background: var(--color-primary-dark);
    border-color: var(--color-primary-dark);
    color: #fff;
  }
  .category-filters__row[data-kind="type"] .filter-chip { font-size: 0.76rem; padding: 7px 12px; }

  @media (prefers-reduced-motion: reduce) {
    html { scroll-behavior: auto; }
    * { transition: none !important; }
  }
</style>
</head>

    { id: "meyveli-soda", category: "İçecekler", name: "Meyveli Soda", description: "Akarçay Patisserie mutfağından özenle hazırlanır.", price: "60,00₺", image: "https://images.unsplash.com/photo-1541544741938-0af808871cc0?w=800&q=80&auto=format&fit=crop", imageAlt: "Meyveli Soda görseli", tags: ["soğuk"], tempGroup: "Soğuk", subGroup: "Meşrubat" },
    { id: "cappy", category: "İçecekler", name: "Cappy", description: "Akarçay Patisserie mutfağından özenle hazırlanır.", price: "90,00₺", image: "https://images.unsplash.com/photo-1541544741938-0af808871cc0?w=800&q=80&auto=format&fit=crop", imageAlt: "Cappy görseli", tags: ["soğuk"], tempGroup: "Soğuk", subGroup: "Meşrubat" },
    { id: "enerji-icecegi", category: "İçecekler", name: "Enerji İçeceği", description: "Akarçay Patisserie mutfağından özenle hazırlanır.", price: "120,00₺", image: "https://images.unsplash.com/photo-1541544741938-0af808871cc0?w=800&q=80&auto=format&fit=crop", imageAlt: "Enerji İçeceği içeceği görseli", tags: ["soğuk"], tempGroup: "Soğuk", subGroup: "Meşrubat" },
    { id: "schweppes", category: "İçecekler", name: "Schweppes", description: "Akarçay Patisserie mutfağından özenle hazırlanır.", price: "90,00₺", image: "https://images.unsplash.com/photo-1541544741938-0af808871cc0?w=800&q=80&auto=format&fit=crop", imageAlt: "Schweppes görseli", tags: ["soğuk"], tempGroup: "Soğuk", subGroup: "Meşrubat" },
  ];

  /* ==========================================================
     RENDER MANTIĞI
     ========================================================== */
  const categories = [...new Set(menuData.map(function (item) { return item.category; }))];

  function slugify(text) {
    return text
      .toLowerCase()
      .replace(/ı/g, 'i').replace(/İ/g, 'i').replace(/ğ/g, 'g').replace(/ü/g, 'u')
      .replace(/ş/g, 's').replace(/ö/g, 'o').replace(/ç/g, 'c')
      .replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)/g, '');
  }

  const navList = document.getElementById('category-nav-list');
  const main = document.getElementById('menu-main');
  const emptyState = document.getElementById('empty-state');
  const searchInput = document.getElementById('search-input');
  const searchClear = document.getElementById('search-clear');

  let isSearching = false;

  const sectionFilters = {};

  function createChipButton(value, label, pressed) {
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'filter-chip';
    btn.dataset.value = value;
    btn.textContent = label;
    btn.setAttribute('aria-pressed', pressed ? 'true' : 'false');
    return btn;
  }

  function buildChipRow(slug, kind, values, visible) {
    const row = document.createElement('div');
    row.className = 'category-filters__row';
    row.dataset.slug = slug;
    row.dataset.kind = kind;
    row.hidden = !visible;
    row.appendChild(createChipButton('all', 'Tümü', true));
    values.forEach(function (value) {
      row.appendChild(createChipButton(value.toLocaleLowerCase('tr-TR'), value, false));
    });
    return row;
  }

  function rebuildTypeRow(slug, tempValue) {
    const section = document.getElementById(slug);
    const typeRow = section.querySelector('.category-filters__row[data-kind="type"]');
    if (!typeRow) return;
    const category = section.dataset.category;
    const items = menuData.filter(function (item) {
      return item.category === category &&
        item.tempGroup && item.tempGroup.toLocaleLowerCase('tr-TR') === tempValue;
    });
    const types = [...new Set(items.map(function (i) { return i.subGroup; }).filter(Boolean))];
    typeRow.innerHTML = '';
    typeRow.appendChild(createChipButton('all', 'Tümü', true));
    types.forEach(function (t) {
      typeRow.appendChild(createChipButton(t.toLocaleLowerCase('tr-TR'), t, false));
    });
  }

  function createCard(item) {
    const article = document.createElement('article');
    article.className = 'product-card';
    article.dataset.name = item.name.toLocaleLowerCase('tr-TR');
    article.dataset.desc = item.description.toLocaleLowerCase('tr-TR');
    article.dataset.category = item.category.toLocaleLowerCase('tr-TR');
    article.dataset.tags = (item.tags || []).join(' ').toLocaleLowerCase('tr-TR');
    article.dataset.temp = item.tempGroup ? item.tempGroup.toLocaleLowerCase('tr-TR') : '';
    article.dataset.subgroup = item.subGroup ? item.subGroup.toLocaleLowerCase('tr-TR') : '';

    article.innerHTML =
      '<div class="product-card__media">' +
        '<img class="product-card__image" src="' + item.image + '" alt="' + item.imageAlt + '" loading="lazy" decoding="async" width="400" height="300">' +
      '</div>' +
      '<div class="product-card__body">' +
        '<div class="product-card__head">' +
          '<h3 class="product-card__name">' + item.name + '</h3>' +
          '<span class="product-card__price">' + item.price + '</span>' +
        '</div>' +
        '<p class="product-card__desc">' + item.description + '</p>' +
        (item.tags && item.tags[0] ? '<span class="product-card__tag">' + item.tags[0] + '</span>' : '') +
      '</div>';

    return article;
  }

  function render() {
    const navFragment = document.createDocumentFragment();
    const mainFragment = document.createDocumentFragment();

    categories.forEach(function (category, index) {
      const slug = 'cat-' + slugify(category);

      const li = document.createElement('li');
      const button = document.createElement('button');
      button.type = 'button';
      button.className = 'category-nav__button';
      button.dataset.target = slug;
      button.textContent = category;
      if (index === 0) button.setAttribute('aria-current', 'true');
      li.appendChild(button);
      navFragment.appendChild(li);

      const section = document.createElement('section');
      section.className = 'menu-category';
      section.id = slug;
      section.dataset.category = category;
      section.setAttribute('aria-labelledby', slug + '-heading');

      const heading = document.createElement('h2');
      heading.className = 'menu-category__title';
      heading.id = slug + '-heading';
      heading.textContent = category;
      section.appendChild(heading);

      const itemsInCategory = menuData.filter(function (item) { return item.category === category; });
      const hasTemp = itemsInCategory.some(function (item) { return item.tempGroup; });
      const hasType = itemsInCategory.some(function (item) { return item.subGroup; });

      if (hasTemp || hasType) {
        sectionFilters[slug] = { temp: 'all', type: 'all' };
        const filterWrap = document.createElement('div');
        filterWrap.className = 'category-filters';

        if (hasTemp) {
          const temps = [...new Set(itemsInCategory.map(function (i) { return i.tempGroup; }).filter(Boolean))];
          filterWrap.appendChild(buildChipRow(slug, 'temp', temps, true));
        }
        if (hasType) {
          const types = hasTemp ? [] : [...new Set(itemsInCategory.map(function (i) { return i.subGroup; }).filter(Boolean))];
          const typeRow = buildChipRow(slug, 'type', types, !hasTemp);
          filterWrap.appendChild(typeRow);
        }

        section.appendChild(filterWrap);
      }

      const grid = document.createElement('div');
      grid.className = 'menu-category__grid';

      itemsInCategory.forEach(function (item) { grid.appendChild(createCard(item)); });

      section.appendChild(grid);
      mainFragment.appendChild(section);
    });

    navList.appendChild(navFragment);
    main.insertBefore(mainFragment, emptyState);
  }

  /* ==========================================================
     ARAMA
     ========================================================== */
  let searchTimer = null;
  function handleSearchInput() {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(applyFilter, 150);
  }

  function applyFilter() {
    const query = searchInput.value.trim().toLocaleLowerCase('tr-TR');
    isSearching = query.length > 0;
    searchClear.hidden = !isSearching;

    let totalVisible = 0;

    document.querySelectorAll('.menu-category').forEach(function (section) {
      const filters = sectionFilters[section.id] || { temp: 'all', type: 'all' };
      let visibleInSection = 0;
      section.querySelectorAll('.product-card').forEach(function (card) {
        const searchMatch = !isSearching ||
          card.dataset.name.includes(query) ||
          card.dataset.desc.includes(query) ||
          card.dataset.category.includes(query) ||
          card.dataset.tags.includes(query);
        const tempMatch = filters.temp === 'all' || card.dataset.temp === filters.temp;
        const typeMatch = filters.type === 'all' || card.dataset.subgroup === filters.type;
        const match = searchMatch && tempMatch && typeMatch;
        card.hidden = !match;
        if (match) visibleInSection++;
      });
      section.hidden = visibleInSection === 0;
      totalVisible += visibleInSection;
    });

    emptyState.hidden = totalVisible !== 0;
  }

  searchInput.addEventListener('input', handleSearchInput);
  searchClear.addEventListener('click', function () {
    searchInput.value = '';
    applyFilter();
    searchInput.focus();
  });
  document.getElementById('empty-reset').addEventListener('click', function () {
    searchInput.value = '';
    applyFilter();
  });

  /* ==========================================================
     KATEGORİ NAV: TIKLAMA İLE SMOOTH SCROLL
     ========================================================== */
  navList.addEventListener('click', function (event) {
    const button = event.target.closest('.category-nav__button');
    if (!button) return;
    const target = document.getElementById(button.dataset.target);
    if (target) target.scrollIntoView({ behavior: 'smooth', block: 'start' });
  });

  /* ==========================================================
     ALT KATEGORİ FİLTRE ÇİPLERİ (İçecekler / Tatlılar)
     ========================================================== */
  document.addEventListener('click', function (event) {
    const chip = event.target.closest('.category-filters__row .filter-chip');
    if (!chip) return;
    const row = chip.closest('.category-filters__row');
    const slug = row.dataset.slug;
    const kind = row.dataset.kind;

    row.querySelectorAll('.filter-chip').forEach(function (b) { b.setAttribute('aria-pressed', 'false'); });
    chip.setAttribute('aria-pressed', 'true');

    if (!sectionFilters[slug]) sectionFilters[slug] = { temp: 'all', type: 'all' };
    sectionFilters[slug][kind] = chip.dataset.value;

    if (kind === 'temp') {
      sectionFilters[slug].type = 'all';
      const section = document.getElementById(slug);
      const typeRow = section.querySelector('.category-filters__row[data-kind="type"]');
      if (typeRow) {
        if (chip.dataset.value === 'all') {
          typeRow.hidden = true;
        } else {
          rebuildTypeRow(slug, chip.dataset.value);
          typeRow.hidden = false;
        }
      }
    }

    applyFilter();
  });

  /* ==========================================================
     SCROLL-SPY: IntersectionObserver
     ========================================================== */
  function setActiveButton(slug) {
    navList.querySelectorAll('.category-nav__button').forEach(function (button) {
      if (button.dataset.target === slug) {
        button.setAttribute('aria-current', 'true');
        button.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
      } else {
        button.removeAttribute('aria-current');
      }
    });
  }

  let lastActiveSlug = null;
  const observer = new IntersectionObserver(function (entries) {
    if (isSearching) return;
    entries.forEach(function (entry) {
      if (entry.isIntersecting && entry.target.id !== lastActiveSlug) {
        lastActiveSlug = entry.target.id;
        setActiveButton(lastActiveSlug);
      }
    });
  }, { rootMargin: '-96px 0px -70% 0px', threshold: 0 });

  /* ==========================================================
     BAŞLAT
     ========================================================== */
  render();
  document.querySelectorAll('.menu-category').forEach(function (section) { observer.observe(section); });
</script>
